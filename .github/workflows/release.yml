name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Verify tag matches gradle.properties version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(grep '^version=' gradle.properties | cut -d= -f2)"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match gradle.properties version $FILE_VERSION (bump gradle.properties before tagging)"
            exit 1
          fi
          echo "VERSION=$FILE_VERSION" >> "$GITHUB_ENV"

      - name: Build bundle
        run: ./gradlew bundleZip

      - name: Extract changelog section
        run: |
          awk -v ver="v${VERSION}" '
            $0 ~ "^## "ver"([[:space:]]|$)" {flag=1; next}
            flag && /^## v/ {exit}
            flag {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::No CHANGELOG.md section found for v${VERSION} (add a '## v${VERSION}' heading before tagging)"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/Natural20-Bundle-${{ env.VERSION }}.zip
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
