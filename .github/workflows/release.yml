name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Verify tag matches gradle.properties version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(grep '^version=' gradle.properties | cut -d= -f2)"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match gradle.properties version $FILE_VERSION (bump gradle.properties before tagging)"
            exit 1
          fi
          echo "VERSION=$FILE_VERSION" >> "$GITHUB_ENV"

      - name: Stub Hytale Assets.zip
        run: |
          # Scaffoldit's HytaleDevServerRun.bootstrapAssets() runs at project
          # configuration time and aborts if Assets.zip is missing, even though
          # bundleZip never reads the file (only runServer does). Drop a
          # 22-byte empty-but-valid zip at the path Scaffoldit resolves so the
          # configure phase passes on the runner.
          STUB_ROOT="$RUNNER_TEMP/hytale-stub"
          ASSETS_DIR="$STUB_ROOT/install/release/package/game/2026.03.26-89796e57b"
          mkdir -p "$ASSETS_DIR"
          python3 -c "import zipfile; zipfile.ZipFile('$ASSETS_DIR/Assets.zip', 'w').close()"
          echo "HYTALE_STUB_ROOT=$STUB_ROOT" >> "$GITHUB_ENV"

      - name: Build bundle
        run: ./gradlew bundleZip -Phytale.home_path="$HYTALE_STUB_ROOT"

      - name: Extract changelog section
        run: |
          awk -v ver="v${VERSION}" '
            $0 ~ "^## "ver"([[:space:]]|$)" {flag=1; next}
            flag && /^## v/ {exit}
            flag {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::No CHANGELOG.md section found for v${VERSION} (add a '## v${VERSION}' heading before tagging)"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/Natural20-Bundle-${{ env.VERSION }}.zip
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
